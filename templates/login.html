{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <title>Login — HotelAurum</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="login-page">
  <div class="login-box">

   <div class="login-logo">
  <svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-bottom:12px;">
    <rect width="56" height="56" rx="16" fill="url(#grad)"/>
    <defs>
      <linearGradient id="grad" x1="0" y1="0" x2="56" y2="56">
        <stop offset="0%" stop-color="#0ea5e9"/>
        <stop offset="100%" stop-color="#14b8a6"/>
      </linearGradient>
    </defs>
    <rect x="12" y="22" width="32" height="22" rx="2" fill="white" fill-opacity="0.15"/>
    <rect x="16" y="26" width="6" height="6" rx="1" fill="white" fill-opacity="0.9"/>
    <rect x="25" y="26" width="6" height="6" rx="1" fill="white" fill-opacity="0.9"/>
    <rect x="34" y="26" width="6" height="6" rx="1" fill="white" fill-opacity="0.9"/>
    <rect x="16" y="36" width="6" height="8" rx="1" fill="white" fill-opacity="0.9"/>
    <rect x="25" y="36" width="6" height="8" rx="1" fill="white" fill-opacity="0.9"/>
    <rect x="34" y="36" width="6" height="8" rx="1" fill="white" fill-opacity="0.9"/>
    <path d="M10 22 L28 10 L46 22" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
    <rect x="23" y="12" width="10" height="2" rx="1" fill="white" fill-opacity="0.6"/>
  </svg>
  <h1>Hotel Aurum</h1>
  <p>Management System — Sign in to continue</p>
</div>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }}" style="margin-bottom:16px;">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="margin-top:8px;">Sign In</button>
    </form>

  </div>
</div>

</body>
</html>
